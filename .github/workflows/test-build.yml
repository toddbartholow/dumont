name: Test Build

# Manual TEST builds, for trying changes on a real machine without heating up
# a dev laptop and without cutting a release. Produces the Windows installers
# and the universal macOS .dmg as run ARTIFACTS only: Actions tab -> Test Build
# -> Run workflow, then download the zip from the run page (collaborators only;
# nothing public, no tag, no version bump, no updater manifest, so the in-app
# updater cannot see these builds). For a real release use release.yml.
#
# This is also the only rehearsal for release.yml's bundling step. CI compiles
# and tests, but it never runs `tauri build`, so a break in the bundle (a bad
# target, a missing Rust toolchain, an unsigned updater artifact) shows up here
# or not at all, and the alternative to finding it here is finding it halfway
# through a public release.
on:
  workflow_dispatch:

jobs:
  build:
    # Uses the same signing key as a real release, so it goes through the same
    # required-reviewer gate ("release" environment). Remove this line if you would
    # rather test builds run without approval.
    environment: release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: '--target x86_64-pc-windows-msvc'
            rust-targets: ''
            artifact: dumont-windows-x64-test
            paths: |
              src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
              src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
          # Mirrors the release matrix exactly: one fat .dmg for both Intel and
          # Apple Silicon. Both Rust targets have to be installed or the
          # universal binary cannot link. macos-latest is Apple Silicon, so
          # without the explicit target this would quietly build arm64 only,
          # which is the bug this leg exists to catch.
          - platform: macos-latest
            args: '--target universal-apple-darwin'
            rust-targets: 'aarch64-apple-darwin,x86_64-apple-darwin'
            artifact: dumont-macos-universal-test
            paths: |
              src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
          # No --target, so the bundles land in target/release, not under a
          # triple. 22.04 to match release.yml: see the glibc note there.
          - platform: ubuntu-22.04
            args: ''
            rust-targets: ''
            artifact: dumont-linux-x64-test
            paths: |
              src-tauri/target/release/bundle/deb/*.deb
              src-tauri/target/release/bundle/rpm/*.rpm
              src-tauri/target/release/bundle/appimage/*.AppImage

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Rust cache
        uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        # Caching is an optimization — a flaky GitHub cache service must never
        # fail the build (mirrors ci.yml / release.yml).
        continue-on-error: true
        with:
          workspaces: './src-tauri -> target'

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build bundles
        # createUpdaterArtifacts is on in tauri.conf.json, so the build needs
        # the signing key even though these artifacts never reach the updater.
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        run: bun run tauri build ${{ matrix.args }}

      # Verify the .dmg really is universal. `tauri build` succeeds either way,
      # so an arm64-only bundle would otherwise sail through this whole leg and
      # only surface as an Intel user unable to open the app.
      - name: Assert the macOS binary is universal
        if: matrix.platform == 'macos-latest'
        run: |
          set -euo pipefail
          # Globbed, not hardcoded: the bundle is "Dumont.app" but the binary
          # inside it is lowercase "dumont", and pinning either name means a
          # rename turns this check into a no-op instead of a failure.
          BIN=$(ls src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app/Contents/MacOS/* | head -1)
          echo "Inspecting $BIN"
          file "$BIN"
          ARCHS=$(lipo -archs "$BIN")
          echo "Architectures: $ARCHS"
          grep -q "x86_64" <<< "$ARCHS" || { echo "::error::x86_64 slice missing: Intel Macs cannot run this"; exit 1; }
          grep -q "arm64"  <<< "$ARCHS" || { echo "::error::arm64 slice missing: Apple Silicon cannot run this"; exit 1; }

      # The whole reason Linux bundles on 22.04 is the glibc floor, and nothing
      # about a green build states what that floor actually came out as. Pin it:
      # if someone "modernises" the runner to 24.04, the bundles keep building
      # and simply stop starting on Ubuntu 22.04 and Debian 12, which is a bug
      # that surfaces as a user bug report, not as a red build.
      - name: Assert the Linux binary's glibc floor
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          set -euo pipefail
          BIN=src-tauri/target/release/dumont
          MAX=$(objdump -T "$BIN" | grep -oE 'GLIBC_[0-9]+\.[0-9]+' | sed 's/GLIBC_//' | sort -V | tail -1)
          echo "Highest glibc symbol required: $MAX (ceiling 2.35, Ubuntu 22.04)"
          if [ "$(printf '%s\n2.35\n' "$MAX" | sort -V | tail -1)" != "2.35" ]; then
            echo "::error::needs glibc $MAX, above 22.04's 2.35: will not start on Ubuntu 22.04 or Debian 12"
            exit 1
          fi

      - name: Upload installers as run artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.paths }}
          if-no-files-found: error
          retention-days: 14
